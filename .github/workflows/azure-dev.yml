on:
  workflow_dispatch:
  push:
    # Run when commits are pushed to mainline branch (main or master)
    # Set this to the mainline branch you are using
    branches:
      - main
      - master

# GitHub Actions workflow to deploy to Azure using azd
# To configure required secrets for connecting to Azure, simply run `azd pipeline config`

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Use the current LTS release (keeps CI up-to-date with latest stable LTS)
          node-version: 'lts/*'

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: tests

      - name: Install test dependencies
        run: npm install
        working-directory: tests

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Azure Functions Core Tools
        run: |
          sudo apt-get update
          sudo apt-get install azure-functions-core-tools-4

      - name: Install API dependencies
        run: pip install -r requirements.txt
        working-directory: src/api

      - name: Start API (background)
        run: |
          func host start --port 3100 &
          sleep 10
        working-directory: src/api
        env:
          CI: true
          API_ENVIRONMENT: develop

      - name: Install web dependencies
        run: npm install
        working-directory: src/web

      - name: Build web application
        run: npm run build
        working-directory: src/web

      - name: Start web server (background)
        run: |
          npm run preview -- --port 3000 --host &
          sleep 5
        working-directory: src/web

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: tests
        env:
          REACT_APP_WEB_BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:3100

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2
      
      - name: Install Azure Function Core Tools
        run: |
          sudo apt-get update
          sudo apt-get install azure-functions-core-tools-4

      - name: Log in with Azure (Federated Credentials)
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Log in with Azure (Client Credentials)
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        run: |
          $info = $Env:AZURE_CREDENTIALS | ConvertFrom-Json -AsHashtable;
          Write-Host "::add-mask::$($info.clientSecret)"

          azd auth login `
            --client-id "$($info.clientId)" `
            --client-secret "$($info.clientSecret)" `
            --tenant-id "$($info.tenantId)"
        shell: pwsh
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision Infrastructure
        run: azd provision --no-prompt
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}

      - name: Deploy Application
        run: azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Grant function access to Key Vault (post-deploy)
        run: |
          set -euo pipefail
          # Find the resource group deployed for this azd environment
          RG=$(az group list --query "[?tags.'azd-env-name'=='${{ vars.AZURE_ENV_NAME }}'].name | [0]" -o tsv)
          if [ -z "$RG" ]; then
            RG=$(az group list --query "[?contains(name, '${{ vars.AZURE_ENV_NAME }}')].name | [0]" -o tsv)
          fi

          echo "Using resource group: $RG"

          # Find the function app name tagged as the API service
          FUNC_NAME=$(az resource list --resource-group "$RG" --resource-type "Microsoft.Web/sites" --query "[?tags.'azd-service-name'=='api'].[name] | [0]" -o tsv)
          if [ -z "$FUNC_NAME" ]; then
            echo "Function app not found in $RG"; exit 1
          fi

          # Try to find the key vault in the same resource group
          KV_NAME=$(az keyvault list --resource-group "$RG" --query "[0].name" -o tsv)
          if [ -z "$KV_NAME" ]; then
            echo "Key Vault not found in $RG"; exit 1
          fi

          echo "Function: $FUNC_NAME, Key Vault: $KV_NAME"

          PRINCIPAL_ID=$(az functionapp identity show --name "$FUNC_NAME" --resource-group "$RG" --query principalId -o tsv)
          KV_ID=$(az keyvault show -n "$KV_NAME" --resource-group "$RG" --query id -o tsv)

          echo "Assigning Key Vault Secrets User to principal $PRINCIPAL_ID on $KV_ID"
          az role assignment create --assignee-object-id "$PRINCIPAL_ID" --role "Key Vault Secrets User" --scope "$KV_ID" || echo "role assignment may already exist"

      - name: Wait for function warm and test DB connectivity
        run: |
          # Small wait to allow role assignment propagation and function warm-up
          sleep 10
          # determine deployed function host name
          RG=$(az group list --query "[?tags.'azd-env-name'=='${{ vars.AZURE_ENV_NAME }}'].name | [0]" -o tsv)
          FUNC_NAME=$(az resource list --resource-group "$RG" --resource-type "Microsoft.Web/sites" --query "[?tags.'azd-service-name'=='api'].[name] | [0]" -o tsv)
          HOSTNAME=$(az functionapp show --name "$FUNC_NAME" --resource-group "$RG" --query defaultHostName -o tsv)
          URL="https://$HOSTNAME/test-beanie"
          echo "Testing $URL"
          set +e
          for i in 1 2 3; do
            RESP=$(curl -sS "$URL" || true)
            echo "$RESP"
            echo "$RESP" | grep -q '"status":"success"' && exit 0
            sleep 5
          done
          set -e
          echo "Connectivity test failed"; exit 1
        env:
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
