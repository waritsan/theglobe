name: E2E Tests

on:
  push:
    branches: [ main, fix-** ]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps (Playwright)
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install test deps
        working-directory: tests
        run: npm ci

      - name: Start API (Azure Functions) in background
        run: |
          cd src/api || exit 0
          echo "Skipping API start if not needed for UI-only tests"

      - name: Build and start Web
        working-directory: src/web
        run: |
          npm ci
          npm run build
          npx serve -s dist -l 5173 &
        env:
          VITE_API_BASE_URL: http://localhost:3100

      - name: Wait for Web to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:5173 > /dev/null; then
              echo "Web is up"; exit 0; fi; sleep 2; done; echo "Web did not start"; exit 1

      - name: Run Playwright tests
        working-directory: tests
        run: npx playwright test --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
