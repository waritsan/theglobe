services:
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      - AZURE_COSMOS_CONNECTION_STRING=mongodb://mongodb:27017
      - AZURE_COSMOS_DATABASE_NAME=Todo
      - API_ALLOW_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:5174
      - API_ENVIRONMENT=develop
    depends_on:
      - mongodb
    networks:
      - app-network

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:3100
      - VITE_APPLICATIONINSIGHTS_CONNECTION_STRING=
    depends_on:
      - api
    networks:
      - app-network

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
